# ATENÇÃO: Esse experimento mata aleatoriamente 1 pod do Backend a cada 2 minutos
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-backend-pods-randomly
  namespace: default
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: backend
  duration: '10s' # Ação executada em menos de 10s
  scheduler:
    cron: '@every 2m' # A cada 2 minutos
---
# Experimento de Latência de Rede (Injeta 200ms de latência no Kafka)
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: kafka-network-latency
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - kafka
  delay:
    latency: '200ms'
    correlation: '100'
    jitter: '0ms'
  duration: '1m'
  scheduler:
    cron: '@every 5m'
