apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-cloud-security
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ruok-dev/Aegis-Cloud.git'
    targetRevision: HEAD
    path: gitops/security
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
